<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPBaonil | Home</title>
    <link rel="icon" href="../public/icon.png" type="image/x-icon">
    <!-- Include CSS from the parent directory -->
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <!-- Shared Navigation -->
    <header>
        <div class="logo">JPBaonil</div>
        <nav>
            <ul>
                <li><a href="home.html" style="color: var(--neon-cyan);">Home</a></li>
                <li><a href="about.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact Me</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Scroll Reveal wrapper -->
        <section class="hidden hero-layout" style="margin-top: 50px;">
            <div class="hero-text">
                <!-- Sequential Animated Typing + Neon Flicker Text -->
                <div style="margin-bottom: 5px;">
                    <span class="typewriter-1" style="font-size: 2rem; color: var(--neon-cyan); font-family: 'Orbitron', sans-serif;">Hello! I am </span>
                </div>
                <div style="margin-bottom: 20px;">
                    <h1 class="animate-text typewriter-2" style="font-size: 3.5rem; line-height: 1.1;">Jhon Paul Baonil</h1>
                </div>
                <p style="font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 30px;">
                    Web Developer | Virtual Assistant | Social Media Manager
                </p>
                <a href="projects.html" class="btn">View My Work</a>
                <a href="contact.html" class="btn" style="margin-left: 15px;">Hire Me</a><br><br>
                <a href="https://github.com/JPB17387" target="_blank" class="btn" style="justify-content: center;">Visit  My  Github  Profile</a>
            </div>
            
            <div class="profile-img-container">
                <img src="../public/profilepic.png" alt="Jhon Paul Baonil Profile Picture" class="profile-img">
            </div>
        </section>
    </main>

    <!-- Three.js (Required for Vanta) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <!-- Vanta Birds Animation -->
    <script src="../animations/vanta.birds.min.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            VANTA.BIRDS({
                el: "body",
                mouseControls: true,
                touchControls: true,
                gyroControls: false,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                backgroundColor: 0x0,
                color1: 0xde1515,
                color2: 0xd3ff00,
                birdSize: 1.30,
                wingSpan: 21.00,
                speedLimit: 4.00,
                separation: 12.00,
                alignment: 12.00,
                cohesion: 12.00
            });
        });
    </script>

    <!-- Include JS from the parent directory -->
    <script src="../js/script.js"></script>
</body>
</html>
